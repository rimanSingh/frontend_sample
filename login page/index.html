<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page or Signup</title>
    <link rel="stylesheet" href="indexStyle.css">
</head>
<body>
    <div class="page-container">
        <div class="left-section">
            <h1>facebook</h1>
            <p>Connects with friends and the world around you on Facebook.</p>
        </div>
        <div class="right-section">
            <form action="#" class="loginForm">
                <input type="text" class="form-group" placeholder="Email or Phone Number">
                <input type="password" class="form-group" placeholder="Password">
                <button type="submit" class="btn">Log In</button>
                <p class="textLink"><a href="#">Forgotten password?</a></p>
                <hr>
                <button type="submit" class="btn1">Create New Account</button>
            </form>
            <p class="footer">
                <a href="#">Create a Page</a> for a celebrity, brand or business.
            </p>
        </div>
    </div>
</body>
</html>
